server.port=8081

spring.application.name=meta-whatsapp-simulator
spring.main.banner-mode=off

logging.level.root=OFF
logging.level.com.simulator.metawhatsapp=OFF
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# Supported Graph API versions (comma-separated -> binds to List<String>)
simulator.api-version.supported=v20.0,v21.0,v22.0,v23.0
simulator.api-version.latest=v23.0

# Bearer tokens the simulator accepts (comma-separated -> binds to List<String>)
simulator.auth.valid-tokens=EAAGm0PX4ZCpsBA_SIMULATOR_STATIC_TOKEN
simulator.auth.verify-token=SIMULATOR_VERIFY_TOKEN

# Outbound webhook (DLR) delivery target
#simulator.webhook.callback-url=http://0.0.0.0:9000/webhook
simulator.webhook.callback-url=https://testqa.gtsstaging.com/api/whatsapp/call-back/1ce8726a-2fe9-41e1-aa5f-1de62039d8c8
simulator.webhook.whatsapp-business-account-id=102934821739482
simulator.webhook.timeout-seconds=5
simulator.webhook.retry.max-attempts=3
simulator.webhook.retry.backoff-seconds=1,2,5

# DLR stage delays (seconds after "accepted")
simulator.delays.sent-seconds=2
simulator.delays.delivered-seconds=5
simulator.delays.read-seconds=10

# Which DLR stages are simulated
simulator.events.sent-enabled=true
simulator.events.delivered-enabled=true
simulator.events.read-enabled=true

# Outcome probability distribution (should sum to 100)
simulator.probability.delivered=98
simulator.probability.failed=1
simulator.probability.expired=1

# Simulated sending phone number identity
simulator.phone-number.display-phone-number=15550001111
simulator.phone-number.phone-number-id=109876543210987

spring.threads.virtual.enabled=true

# Increase Tomcat connector thread pool and socket backlog for burst testing
server.tomcat.threads.max=500
server.tomcat.accept-count=2000
server.tomcat.max-connections=10000
server.tomcat.connection-timeout=20000
server.tomcat.threads.min-spare=50